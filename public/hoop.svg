<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90">
  <defs>
    <linearGradient id="g" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#C8ECFF"/>
      <stop offset="30%"  stop-color="#5BB8F5"/>
      <stop offset="65%"  stop-color="#2272C3"/>
      <stop offset="100%" stop-color="#0D4A8A"/>
    </linearGradient>
    <linearGradient id="lf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(40,130,220,0.90)"/>
      <stop offset="100%" stop-color="rgba(91,184,245,0.60)"/>
    </linearGradient>
    <linearGradient id="rf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(91,184,245,0.60)"/>
      <stop offset="100%" stop-color="rgba(14,70,150,0.95)"/>
    </linearGradient>
  </defs>
  <!-- Outer glow shadow -->
  <polygon points="45,9 84,33 84,61 45,87 6,61 6,33" fill="rgba(20,80,180,0.35)"/>
  <!-- Main body -->
  <polygon points="45,6 82,32 82,58 45,84 8,58 8,32" fill="url(#g)"/>
  <!-- Top-left facet highlight -->
  <polygon points="45,6 8,32 45,42"  fill="rgba(255,255,255,0.38)"/>
  <!-- Top-right facet -->
  <polygon points="45,6 82,32 45,42" fill="rgba(255,255,255,0.16)"/>
  <!-- Bottom-left -->
  <polygon points="45,84 8,58 45,48"  fill="rgba(14,60,140,0.55)"/>
  <!-- Bottom-right -->
  <polygon points="45,84 82,58 45,48" fill="rgba(14,50,120,0.72)"/>
  <!-- Left side -->
  <polygon points="8,32 8,58 45,48 45,42"  fill="url(#lf)"/>
  <!-- Right side -->
  <polygon points="82,32 82,58 45,48 45,42" fill="url(#rf)"/>
  <!-- Outline -->
  <polygon points="45,6 82,32 82,58 45,84 8,58 8,32"
    fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Top shine -->
  <polygon points="45,6 8,32 45,42" fill="rgba(255,255,255,0.10)"/>
</svg>
